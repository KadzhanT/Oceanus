 version: '3.9'
 services:
   ollama:
    image: ollama/ollama:latest
    container_name: oceanus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - oceanus-network
    restart: unless-stopped
    # ОСТАВЛЯЕМ ТОЛЬКО ЭТО ДЛЯ GPU:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
 
   qdrant:
     image: qdrant/qdrant:latest
     container_name: oceanus-qdrant
     ports:
       - "6333:6333"
     volumes:
       - qdrant-data:/qdrant/storage
     networks:
       - oceanus-network
     restart: unless-stopped
     environment:
       - QDRANT_API_KEY=${QDRANT_API_KEY:-}
 
 volumes:
   ollama-data:
     driver: local
   qdrant-data:
     driver: local
 
 networks:
   oceanus-network:
     driver: bridge